<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle2"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0f1923"/>
  <!-- Suit body dark gray -->
  <rect x="20" y="155" width="160" height="70" fill="#2d3748" rx="4"/>
