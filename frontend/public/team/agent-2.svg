  <path d="M106 103 Q115 98 124 103" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="110" rx="7" ry="5.5" fill="white"/>
  <ellipse cx="115" cy="110" rx="7" ry="5.5" fill="white"/>
  <ellipse cx="85" cy="110" rx="4" ry="4" fill="#2d1800"/>
  <ellipse cx="115" cy="110" rx="4" ry="4" fill="#2d1800"/>
  <circle cx="86.5" cy="108.5" r="1.5" fill="white"/>
