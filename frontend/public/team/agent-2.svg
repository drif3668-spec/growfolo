  <polygon points="122,155 155,185 122,185" fill="#3a4a5c"/>
  <!-- Suit collar -->
  <polygon points="78,148 100,165 78,168" fill="#2d3748"/>
  <polygon points="122,148 100,165 122,168" fill="#2d3748"/>
  <!-- Neck -->
  <rect x="87" y="136" width="26" height="24" rx="5" fill="#c9906a"/>
  <!-- Head -->
  <ellipse cx="100" cy="115" rx="40" ry="44" fill="#c9906a"/>
  <!-- Ears -->
  <ellipse cx="60" cy="115" rx="7" ry="9" fill="#bb7f58"/>
  <ellipse cx="140" cy="115" rx="7" ry="9" fill="#bb7f58"/>
  <!-- Short dark hair -->
  <ellipse cx="100" cy="76" rx="40" ry="18" fill="#1a0a00"/>
  <rect x="60" y="76" width="80" height="16" fill="#1a0a00"/>
  <ellipse cx="64" cy="88" rx="10" ry="16" fill="#1a0a00"/>
  <ellipse cx="136" cy="88" rx="10" ry="16" fill="#1a0a00"/>
  <!-- Eyebrows -->
