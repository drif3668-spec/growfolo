services:
  db:
    image: postgres:16-alpine
    container_name: growfolo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-growfolo}
      POSTGRES_USER: ${POSTGRES_USER:-growfolo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-growfolo_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-growfolo} -d ${POSTGRES_DB:-growfolo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: growfolo-api
    restart: unless-stopped
    environment:
      APP_NAME: Growfolo API
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-growfolo}:${POSTGRES_PASSWORD:-growfolo_password}@db:5432/${POSTGRES_DB:-growfolo}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      FRONTEND_URL: http://localhost:3000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Growfolo <orders@growfolo.io>}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: growfolo-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
